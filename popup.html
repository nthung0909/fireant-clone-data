<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireant Excel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 350px;
      padding: 16px;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-weight: 700;
      transition: background-color 0.2s ease, transform 0.2s ease;
      margin-bottom: 8px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      background-color: #c4c4c4;
      cursor: not-allowed;
      opacity: 0.85;
    }

    .button-primary {
      background-color: #2563eb;
    }

    .button-secondary {
      background-color: #16a34a;
    }

    .button-tertiary {
      background-color: #64748b;
    }

    .preview-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .preview-nav button {
      width: auto;
      flex: 1;
      min-width: 120px;
      padding: 8px 10px;
      font-size: 12px;
      margin-bottom: 0;
    }

    #preview {
      margin-top: 16px;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 260px;
      width: 100%;
    }

    .preview-section {
      margin-bottom: 18px;
    }

    .preview-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    #preview table {
      min-width: 520px;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 13px;
    }

    #preview th,
    #preview td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: right;
    }

    #preview th {
      background: #f3f3f3;
      font-weight: bold;
    }

    #preview td:first-child,
    #preview th:first-child {
      text-align: left;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="field">
    <label>StockID</label>
    <input id="stockID" value="VNM" />
  </div>

  <div class="field">
    <label>Type</label>
    <select id="type">
      <option value="year">Year</option>
      <option value="quarter">Quarter</option>
    </select>
  </div>

  <div class="field">
    <label>Count</label>
    <input id="count" type="number" value="6" />
  </div>

  <button id="submitBtn" class="button-primary">Submit</button>
  <button id="downloadBtn" class="button-secondary" disabled>Download excel</button>

  <div id="status"></div>
  <div id="previewNav" class="preview-nav" hidden></div>
  <div id="preview"></div>

  <script src="exceljs.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
